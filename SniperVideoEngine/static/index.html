<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dezafira - Fábrica de Canais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header .tag {
            font-size: 10px;
            font-weight: 800;
            color: #1ed760;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        .header p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 4px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
        }
        .stat-card .label {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 900;
            margin-top: 4px;
        }
        .stat-card .value.green { color: #1ed760; }
        .stat-card .value.yellow { color: #f5a623; }
        .stat-card .value.blue { color: #3498db; }
        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            max-height: 360px;
            background: #000;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-info { padding: 16px; }
        .video-info h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .badge.approved { background: rgba(30,215,96,0.15); color: #1ed760; }
        .badge.pending { background: rgba(245,166,35,0.15); color: #f5a623; }
        .badge.rejected { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .badge.completed { background: rgba(52,152,219,0.15); color: #3498db; }
        .date { font-size: 11px; color: rgba(255,255,255,0.3); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
        }
        .empty-state svg { opacity: 0.2; margin-bottom: 16px; }
        .refresh-btn {
            background: #1ed760;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: #1db954; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .api-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .api-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #1ed760;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="tag">Automation Engine</div>
        <h1>Fábrica de Canais</h1>
        <p>Gere roteiros, narração, legendagem dinâmica e publique no YouTube automaticamente.</p>
    </div>
    <div class="container">
        <div class="top-bar">
            <div class="api-status">
                <div class="api-dot"></div>
                <span>Backend conectado em <strong>127.0.0.1:8000</strong></span>
            </div>
            <button class="refresh-btn" onclick="loadHistory()">Atualizar ↻</button>
        </div>

        <div class="stats" id="stats"></div>

        <div class="section-title">🎬 Histórico de Vídeos</div>
        <div class="video-grid" id="videoGrid">
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="4"/>
                    <path d="M12 18V6l-5 4 5-4 5 4"/>
                </svg>
                <p>Carregando vídeos...</p>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        async function loadHistory() {
            try {
                const res = await fetch(`${API}/api/v1/predictions/history`);
                const data = await res.json();
                const videos = data.history || [];

                // Update stats
                const approved = videos.filter(v => v.approval_status === 'approved').length;
                const pending = videos.filter(v => v.approval_status === 'pending').length;
                const total = videos.length;

                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="label">Total de Vídeos</div>
                        <div class="value blue">${total}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Aprovados</div>
                        <div class="value green">${approved}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Pendentes</div>
                        <div class="value yellow">${pending}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Taxa de Aprovação</div>
                        <div class="value green">${total > 0 ? Math.round((approved/total)*100) : 0}%</div>
                    </div>
                `;

                // Render video cards
                const grid = document.getElementById('videoGrid');
                if (videos.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="2" y="2" width="20" height="20" rx="4"/>
                                <path d="M12 18V6l-5 4 5-4 5 4"/>
                            </svg>
                            <p>Nenhum vídeo gerado ainda.<br>Inicie uma automação para começar!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = videos.map(v => {
                    const videoUrl = v.video_url ? `${API}${v.video_url}` : '';
                    const approval = v.approval_status || 'pending';
                    const date = v.created_at || '';
                    return `
                        <div class="video-card">
                            <div class="video-wrapper">
                                ${videoUrl
                                    ? `<video src="${videoUrl}" controls preload="metadata" poster="" onclick="this.play()"></video>`
                                    : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,0.2);font-size:12px;">Sem preview</div>`
                                }
                            </div>
                            <div class="video-info">
                                <h3>${escapeHtml(v.prompt)}</h3>
                                <div class="video-meta">
                                    <span class="badge ${approval}">${approval}</span>
                                    <span class="date">${date}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                document.getElementById('videoGrid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <p style="color:#e74c3c;">Erro ao conectar ao backend: ${err.message}<br>Verifique se o servidor está rodando em 127.0.0.1:8000</p>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadHistory();
    </script>
</body>
</html>
